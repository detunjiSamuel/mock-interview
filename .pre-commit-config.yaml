repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check
        language: system
        types: [python]
        pass_filenames: true

      - id: black
        name: black
        entry: uv run black --check
        language: system
        types: [python]
        pass_filenames: true

      - id: mypy-shared
        name: mypy (shared)
        entry: bash -c 'cd shared && uv run mypy .'
        language: system
        files: ^shared/
        pass_filenames: false

      - id: mypy-transcript-service
        name: mypy (transcript_service)
        entry: bash -c 'cd services/transcript_service && uv run mypy .'
        language: system
        files: ^services/transcript_service/
        pass_filenames: false

      - id: mypy-feedback-service
        name: mypy (feedback_service)
        entry: bash -c 'cd services/feedback_service && uv run mypy .'
        language: system
        files: ^services/feedback_service/
        pass_filenames: false
