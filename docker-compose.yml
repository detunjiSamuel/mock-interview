services:
  # MongoDB database
  mongodb:
    image: mongo:latest
    container_name: interview-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-example}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - interview-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # RabbitMQ message broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: interview-rabbitmq
    restart: always
    ports:
      - "5672:5672"   # RabbitMQ default port
      - "15672:15672" # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - interview-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Main API service
  main-api:
    build:
      context: .
      dockerfile: services/main_api/Dockerfile
    container_name: interview-main-api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - MONGO_URI=mongodb://${MONGO_USER:-root}:${MONGO_PASSWORD:-example}@mongodb:27017/interview?authSource=admin
      - RABBITMQ_URI=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - FILE_STORAGE_PATH=/workspace/services/main_api/storage
    volumes:
      - main_api_storage:/workspace/services/main_api/storage
    networks:
      - interview-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Transcript service
  transcript-service:
    build:
      context: .
      dockerfile: services/transcript_service/Dockerfile
    container_name: interview-transcript-service
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      main-api:
        condition: service_healthy
    environment:
      - RABBITMQ_URI=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MAIN_API_URL=http://main-api:8000
      - MAIN_API_APP_ID=${MAIN_API_APP_ID:-transcript_service}
    networks:
      - interview-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Feedback service
  feedback-service:
    build:
      context: .
      dockerfile: services/feedback_service/Dockerfile
    container_name: interview-feedback-service
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_URI=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - interview-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Frontend client
  frontend:
    build:
      context: ./Client
      dockerfile: Dockerfile
    container_name: interview-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      main-api:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    networks:
      - interview-network

volumes:
  mongodb_data:
  rabbitmq_data:
  main_api_storage:

networks:
  interview-network:
    driver: bridge
